name: Build APK

on:
  push:
    branches:
      - main

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

    - name: Download code
      uses: actions/checkout@v4


    - name: Install tools
      run: |
        sudo apt update
        sudo apt install -y python3-pip git zip unzip
        pip install buildozer cython


    - name: Make APK
      run: |
        yes | buildozer android debug


    - name: Save APK
      uses: actions/upload-artifact@v4
      with:
        name: Flying-Naksoda-APK
        path: bin/*.apk
